<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document</title>
  <style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 10px;
        padding: 10px;
    }

    .card-container{
        width: 360px;
        max-width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.25);
        border-radius: 10px;
        background: linear-gradient(180deg, #fff9e6, #f7e0d8);
        transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .card{
        width: 100%;
        border: none;
        background: rgba(255, 255, 255, 0.95);
        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.08);
        border-radius: 10px;
    }

    .card-img{
        width: 100%;
        max-width: 100%;
        height: auto;
        display: block;
    }

    .card-container:hover{
        transform: translateY(-6px);
        box-shadow: 0 18px 28px rgba(0, 0, 0, 0.35);
    }

    .card-header h2{
        color: #b4751b;
        margin-bottom: 10px;
    }

    .card-btn{
        background: #007bff;
        color: #fff;
        padding: 10px 18px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: transform 0.2s ease, background 0.2s ease;
    }
  </style>
</head>
<body>
    <div class="card-container">
        <img src="./672673501_927670723389462_6552243650037777584_n.jpg" alt="card-image" class="card-img">
        <div class="card">
            <div class="card-header">
                <h2>Gold card</h2>
                <div card-badge>
                    <button class="badge btn">10 shipped</button>
                    <button class="badge-btn">5 pending</button>
                </div>
            </div>
            <div class="card-body">
                <p>This is the content of the gold card.</p>
                <button class="card-btn">Buy Now</button>
            </div>
        </div>
    </div>

</body>
