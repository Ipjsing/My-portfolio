<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Container</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    .container {
      display: flex;
      width: 100%;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
      padding: 250px 10px;
      border: 1px solid red;
    }

    .div1,
    .div2,
    .div3,
    .div4,
    .div5,
    .div6 {
      width: 230px;
      max-width: 100%;
      height: 230px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #333;
      background-size: cover;
      background-repeat: no-repeat;
      background-position: center;
      color: #fff;
      font-weight: bold;
    }

    .div1 {
      border-color: blue;
      background-image: url('./672673501_927670723389462_6552243650037777584_n.jpg');
    }

    .div2 {
      border-color: yellow;
      background-image: url('./672673501_927670723389462_6552243650037777584_n.jpg');
    }

    .div3 {
      border-color: green;
      background: #2e8b57;
    }

    .div4 {
      border-color: orange;
      background: #ff8c00;
    }

    .div5 {
      border-color: purple;
      background: #8a2be2;
    }

    .div6 {
      border-color: teal;
      background: #008080;
    }
  </style>
</head>
<body>
    <div class="container">
        <div class="div1" style="background: url('./672673501_927670723389462_6552243650037777584_n.jpg') center/cover no-repeat;"></div>
        <div class="div2" style="background: url('./672673501_927670723389462_6552243650037777584_n.jpg') center/cover no-repeat;"></div>
        <div class="div3"> DIV 3</div>
        <div class="div4">DIV 4</div>
        <div class="div5">DIV 5</div>
        <div class="div6">div 6</div>
    </div>
    </body>
</html>
